<script>
// ==================== 技术指标引擎 ====================
var TI = {
  sma: function(d,p) {
    if(d.length<p) return[]; var r=new Array(d.length).fill(null), s=0;
    for(var i=0;i<d.length;i++){ s+=d[i]; if(i>=p)s-=d[i-p]; if(i>=p-1)r[i]=s/p; }
    return r;
  },
  ema: function(d,p) {
    if(d.length<2) return[]; var r=new Array(d.length).fill(null), k=2/(p+1);
    r[0]=d[0]; for(var i=1;i<d.length;i++) r[i]=d[i]*k+r[i-1]*(1-k);
    return r;
  },
  rsi: function(d,p) {
    if(d.length<p+1) return[]; var r=new Array(d.length).fill(null), g=0,l=0;
    for(var i=1;i<=p;i++){ var df=d[i]-d[i-1]; if(df>0)g+=df; else l-=df; }
    var ag=g/p, al=l/p;
    r[p]=al===0?100:100-100/(1+ag/al);
    for(var i=p+1;i<d.length;i++){
      var df=d[i]-d[i-1];
      ag=(ag*(p-1)+(df>0?df:0))/p; al=(al*(p-1)+(df<0?-df:0))/p;
      r[i]=al===0?100:100-100/(1+ag/al);
    }
    return r;
  },
  macd: function(d,fs,sl,sg) {
    fs=fs||12;sl=sl||26;sg=sg||9;
    var ef=TI.ema(d,fs), es=TI.ema(d,sl), ml=[], sl2=[], hg=[];
    for(var i=0;i<d.length;i++){ ml[i]=(ef[i]!==null&&es[i]!==null)?ef[i]-es[i]:null; }
    var mv=ml.filter(function(v){return v!==null;}), sv=TI.ema(mv,sg), j=0;
    for(var i=0;i<d.length;i++){
      if(ml[i]!==null&&j<sv.length){ sl2[i]=sv[j]; hg[i]=ml[i]-sv[j]; j++; }
      else{ sl2[i]=null; hg[i]=null; }
    }
    return {macd:ml,signal:sl2,histogram:hg};
  },
  bollinger: function(d,p,m) {
    p=p||20;m=m||2; var sma=TI.sma(d,p), up=[], lo=[];
    for(var i=0;i<d.length;i++){
      if(sma[i]===null){ up[i]=null;lo[i]=null;continue; }
      var sq=0,ct=0;
      for(var j=Math.max(0,i-p+1);j<=i;j++){ sq+=(d[j]-sma[i])*(d[j]-sma[i]); ct++; }
      var std=Math.sqrt(sq/ct);
      up[i]=sma[i]+m*std; lo[i]=sma[i]-m*std;
    }
    return {middle:sma,upper:up,lower:lo};
  },
  atr: function(h,l,c,p) {
    p=p||14; var tr=[0];
    for(var i=1;i<c.length;i++){
      tr.push(Math.max(Math.abs(h[i]-l[i]),Math.abs(h[i]-c[i-1]),Math.abs(l[i]-c[i-1])));
    }
    var r=new Array(c.length).fill(null), s=0;
    for(var i=0;i<Math.min(p,tr.length);i++) s+=tr[i];
    r[p-1]=s/p;
    for(var i=p;i<tr.length;i++) r[i]=(r[i-1]*(p-1)+tr[i])/p;
    return r;
  }
};

// ==================== V7 评分引擎 ====================
function v7Score(prices,highs,lows,closes) {
  var n=prices.length; if(n<30) return null;

  // 1. 形态识别 (25)
  var recent=prices.slice(-20), maxP=Math.max.apply(null,recent), minP=Math.min.apply(null,recent);
  var range=maxP-minP, cur=prices[n-1], posInRange=(cur-minP)/(range||1);
  var mid=Math.floor(recent.length/2);
  var fh=recent.slice(0,mid), sh=recent.slice(mid);
  var fhMax=Math.max.apply(null,fh), shMax=Math.max.apply(null,sh);
  var fhMin=Math.min.apply(null,fh), shMin=Math.min.apply(null,sh);

  var pScore=0, pName='震荡整理', pConf=40;
  var rc=(range||1);

  if(Math.abs(fhMax-shMax)/rc<0.15&&shMin>fhMin){ pName='上升三角形'; pConf=68; pScore=22; }
  else if(Math.abs(fhMin-shMin)/rc<0.15&&shMax<fhMax){ pName='下降三角形'; pConf=66; pScore=20; }
  else if(Math.abs(fhMin-shMin)/rc<0.1&&cur>(fhMin+shMin)/2+range*0.3){ pName='W底'; pConf=72; pScore=24; }
  else if(shMax<fhMax&&shMin>fhMin&&Math.abs((shMax-shMin)-(fhMax-fhMin))/rc<0.2){ pName='对称三角形'; pConf=58; pScore=17; }
  else if(fhMin<shMin&&shMin>prices[n-1]*0.98){ pName='头肩底雏形'; pConf=55; pScore=18; }
  else { pScore=12; }

  pScore=Math.min(25,pScore);

  // 2. 趋势角度 (20)
  var sma20=TI.sma(prices,20), sma50=TI.sma(prices,50);
  var lastS20=sma20[n-1], lastS50=sma50[n-1];
  var trend=prices[n-1]-prices[n-20], trendPct=trend/prices[n-20]*100;
  var aScore=0, aDesc='';

  if(lastS20&&lastS50){
    if(lastS20>lastS50){
      if(trendPct>1.5){ aScore=18; aDesc='强势多头排列'; }
      else if(trendPct>0.5){ aScore=15; aDesc='多头排列'; }
      else { aScore=12; aDesc='偏多排列'; }
    } else if(lastS20<lastS50){
      if(trendPct<-1.5){ aScore=16; aDesc='强势空头排列'; }
      else if(trendPct<-0.5){ aScore=13; aDesc='空头排列'; }
      else { aScore=10; aDesc='偏空排列'; }
    } else { aScore=14; aDesc='均线粘合·变盘前兆'; }
  }
  aScore=Math.min(20,aScore);

  // 3. 多周期共振 (20)
  var rsiV=TI.rsi(prices,14), lastRsi=rsiV[n-1]||50;
  var macdD=TI.macd(prices), lastMacd=macdD.macd[n-1], lastSig=macdD.signal[n-1], lastHist=macdD.histogram[n-1];
  var rScore=8, rDesc='';

  if(lastMacd!==null&&lastSig!==null){
    if(lastMacd>lastSig&&lastHist>0){ rScore+=5; rDesc='MACD金叉'; }
    else if(lastMacd<lastSig&&lastHist<0){ rScore+=3; rDesc='MACD死叉'; }
    else if(lastMacd>lastSig&&lastHist<0){ rScore+=4; rDesc='MACD收敛·注意变盘'; }
  }
  if(lastRsi>70){ rScore+=2; rDesc+=' RSI超买'; }
  else if(lastRsi<30){ rScore+=4; rDesc+=' RSI超卖'; }
  else if(lastRsi>50){ rScore+=3; rDesc+=' RSI偏强'; }
  else { rScore+=2; rDesc+=' RSI偏弱'; }
  if(trendPct>0&&lastRsi>50&&lastMacd>lastSig){ rScore+=4; rDesc+=' 多周期共振↑'; }
  else if(trendPct<0&&lastRsi<50&&lastMacd<lastSig){ rScore+=4; rDesc+=' 多周期共振↓'; }
  else { rScore+=1; rDesc+=' 多周期分歧'; }
  rScore=Math.min(20,rScore);

  // 4. 支撑阻力 (20)
  var bb=TI.bollinger(prices,20,2);
  var bbUp=bb.upper[n-1], bbLo=bb.lower[n-1], bbMid=bb.middle[n-1];
  var srScore=10, srDesc='';
  if(bbUp&&bbLo){
    var bbPos=(cur-bbLo)/(bbUp-bbLo);
    if(bbPos<0.2){ srScore+=6; srDesc='触及布林下轨·强支撑'; }
    else if(bbPos>0.8){ srScore+=4; srDesc='触及布林上轨·强阻力'; }
    else if(bbPos>0.5){ srScore+=2; srDesc='布林中轨上方'; }
    else { srScore+=2; srDesc='布林中轨下方'; }
  }
  if(posInRange<0.3){ srScore+=3; srDesc+=' 接近区间低位'; }
  else if(posInRange>0.7){ srScore+=1; srDesc+=' 接近区间高位'; }
  srScore=Math.min(20,srScore);

  // 5. 指标背离 (15)
  var dvScore=5, dvDesc='';
  if(lastRsi>50&&lastMacd>lastSig){ dvScore+=5; dvDesc='RSI-MACD一致偏多'; }
  else if(lastRsi<50&&lastMacd<lastSig){ dvScore+=5; dvDesc='RSI-MACD一致偏空'; }
  else if(lastRsi>60&&lastMacd<lastSig){ dvScore+=7; dvDesc='RSI-MACD顶背离'; }
  else if(lastRsi<40&&lastMacd>lastSig){ dvScore+=7; dvDesc='RSI-MACD底背离'; }
  else { dvScore+=3; dvDesc='指标中性'; }
  dvScore=Math.min(15,dvScore);

  var total=pScore+aScore+rScore+srScore+dvScore;
  var verdict, vc;
  if(total>=75){ verdict='🔥 强烈信号'; vc='vbar-strong'; }
  else if(total>=60){ verdict='✅ 可参考'; vc='vbar-ok'; }
  else if(total>=40){ verdict='⚠️ 谨慎观望'; vc='vbar-warn'; }
  else { verdict='❌ 不建议'; vc='vbar-no'; }

  return {
    total:total, verdict:verdict, vc:vc,
    isUp:trendPct>-0.3,
    bars:[
      {name:'形态识别',score:pScore,max:25,color:'#a371f7',detail:pName+' 置信'+pConf+'%'},
      {name:'趋势角度',score:aScore,max:20,color:'#39d2c0',detail:aDesc+' trend='+trendPct.toFixed(1)+'%'},
      {name:'多周期共振',score:rScore,max:20,color:'#e6b450',detail:rDesc.trim()},
      {name:'支撑阻力',score:srScore,max:20,color:'#e0833a',detail:srDesc.trim()},
      {name:'指标背离',score:dvScore,max:15,color:'#f85149',detail:dvDesc.trim()}
    ],
    pattern:{name:pName,confidence:pConf},
    ind:{rsi:lastRsi, macd:lastMacd, signal:lastSig, hist:lastHist, trendPct:trendPct, bbUp:bbUp, bbLo:bbLo, bbMid:bbMid}
  };
}

function drawKline() {
  var cv=document.getElementById('klineCanvas'); if(!cv) return;
  var ctx=cv.getContext('2d');
  var W=cv.parentElement.clientWidth, H=85;
  cv.width=W*2; cv.height=H*2;
  cv.style.width=W+'px'; cv.style.height=H+'px';
  ctx.scale(2,2);

  ctx.clearRect(0,0,W,H);
  var d=ST.closes; if(d.length<2){
    ctx.fillStyle='#6e7681'; ctx.font='10px sans-serif'; ctx.textAlign='center';
    ctx.fillText('积累数据…('+d.length+'/10)',W/2,H/2); return;
  }
  var mn=Math.min.apply(null,d)-3, mx=Math.max.apply(null,d)+3;
  var range=mx-mn||1, bw=Math.max(2,W/d.length-1);

  for(var i=0;i<d.length;i++){
    var x=i*(W/d.length);
    var hp=ST.highs[i]||d[i]+1, lp=ST.lows[i]||d[i]-1;
    var op=i>0?ST.closes[i-1]:d[i], cp=d[i];
    var yH=H-(hp-mn)/range*H, yL=H-(lp-mn)/range*H;
    var yO=H-(op-mn)/range*H, yC=H-(cp-mn)/range*H;
    var color=cp>=op?'#26d982':'#f85149';

    ctx.strokeStyle=color; ctx.lineWidth=0.7;
    ctx.beginPath(); ctx.moveTo(x+bw/2,yH); ctx.lineTo(x+bw/2,yL); ctx.stroke();

    ctx.fillStyle=color;
    var bt=Math.min(yO,yC), bh=Math.abs(yC-yO)||0.7;
    ctx.fillRect(x+1,bt,bw-1.5,bh);
  }

  ctx.fillStyle='#6e7681'; ctx.font='7px sans-serif'; ctx.textAlign='left';
  ctx.fillText(mx.toFixed(1),2,9); ctx.fillText(mn.toFixed(1),2,H-2);
}

// ==================== 数据获取 ====================
function fetchXHR(url,cb,eb) {
  try{
    var x=new XMLHttpRequest(); x.open('GET',url,true); x.timeout=8000;
    x.onreadystatechange=function(){
      if(x.readyState===4){
        if(x.status===200){
          try{ var d=JSON.parse(x.responseText);
            if(d&&d.xau&&d.xau.usd){ cb(d.xau.usd); return; }
          }catch(e){}
        }
        if(eb)eb();
      }
    };
    x.onerror=function(){if(eb)eb();}; x.ontimeout=function(){if(eb)eb();}; x.send();
  }catch(e){if(eb)eb();}
}

function fetchSina(cb,eb) {
  var scr=document.createElement('script'), tid=setTimeout(function(){cln();eb();},6000);
  function cln(){ clearTimeout(tid); if(scr.parentNode)scr.parentNode.removeChild(scr); delete window.hq_str_hf_XAU; }
  var cc=0;
  function chk(){
    cc++; var raw=window.hq_str_hf_XAU;
    if(raw&&typeof raw==='string'&&raw.indexOf(',')>0){
      cln(); var p=parseFloat(raw.split(',')[0]);
      if(p>100){ cb(p); return; }
    }
    if(cc<50) setTimeout(chk,100); else{ cln(); eb(); }
  }
  scr.src='https://hq.sinajs.cn/list=hf_XAU';
  scr.onload=function(){setTimeout(chk,50);}; scr.onerror=function(){cln();eb();};
  document.head.appendChild(scr);
}

function fetchPrice() {
  var dot=document.getElementById('liveDot'), st=document.getElementById('statusText');
  dot.className='live-dot on'; st.textContent='📡 获取中…';

  function onP(np) {
    ST.price=np; ST.lastFetch=new Date(); ST.fetchCount++;
    dot.className='live-dot on'; st.textContent='✅ 在线·第'+ST.fetchCount+'次';

    if(!ST.prices.length||ST.prices[ST.prices.length-1]!==ST.price){
      ST.prices.push(ST.price);
      ST.highs.push(ST.price+Math.random()*3);
      ST.lows.push(ST.price-Math.random()*3);
      ST.closes.push(ST.price+(Math.random()-0.5)*2);
      if(ST.prices.length>70){ ST.prices.shift();ST.highs.shift();ST.lows.shift();ST.closes.shift(); }
    }
    updateAll(); saveState();
  }

  function onF(){ dot.className='live-dot off'; st.textContent='⚠️ 离线(缓存)'; saveState(); }

  fetchSina(onP,function(){
    var apis=[
      'https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/xau.json',
      'https://latest.currency-api.pages.dev/v1/currencies/xau.json'
    ]; var idx=0;
    function tn(){ if(idx>=apis.length){onF();return;} fetchXHR(apis[idx],onP,tn); idx++; }
    tn();
  });
}

function saveState(){
  try{
    localStorage.setItem('paw3pro',JSON.stringify({
      price:ST.price, prices:ST.prices.slice(-70), highs:ST.highs.slice(-70),
      lows:ST.lows.slice(-70), closes:ST.closes.slice(-70),
      lastFetch:ST.lastFetch?ST.lastFetch.getTime():null, fetchCount:ST.fetchCount
    }));
  }catch(e){}
}

// ==================== UI更新 ====================
function updateAll() {
  var p=ST.price, pcl=ST.prevClose, ch=p-pcl, chPct=ch/pcl*100;

  document.getElementById('priceDisplay').textContent=p.toFixed(1);
  var cd=document.getElementById('changeDisplay');
  cd.textContent=(ch>=0?'+':'')+ch.toFixed(1)+' ('+(ch>=0?'+':'')+chPct.toFixed(2)+'%)';
  cd.style.color=ch>=0?'#26d982':'#f85149';

  document.getElementById('openPx').textContent=ST.open.toFixed(1);
  document.getElementById('highPx').textContent=ST.high.toFixed(1);
  document.getElementById('lowPx').textContent=ST.low.toFixed(1);

  var t=ST.lastFetch||new Date();
  document.getElementById('updateTime').textContent=t.toTimeString?t.toTimeString().slice(0,8):'';
  document.getElementById('pageGenTime').textContent=new Date().toLocaleString('zh-CN',{hour12:false});

  drawKline();

  if(ST.closes.length>=30){ ST.v7=v7Score(ST.prices,ST.highs,ST.lows,ST.closes); updateV7(); }
  updateStrategy(p,ch); updateIndicators(p); updateSR(p); updatePattern(p); calcPos();
}

function updateV7() {
  var v=ST.v7; if(!v) return;
  var r=document.getElementById('scoreRing'); r.textContent=v.total;
  r.style.borderColor=v.total>=75?'#26d982':v.total>=60?'#e6b450':v.total>=40?'#e0833a':'#f85149';
  r.style.color=r.style.borderColor;

  document.getElementById('v7Verdict').textContent=v.verdict;
  document.getElementById('v7Detail').textContent=v.isUp?'偏多信号':'偏空信号';

  var h='';
  v.bars.forEach(function(b){
    var pct=Math.round(b.score/b.max*100);
    h+='<div class="bar-wrap"><div class="bar-row">'+
      '<span class="bar-label">'+b.name+'</span>'+
      '<div class="bar-track"><div class="bar-fill" style="width:'+pct+'%;background:'+b.color+'"></div></div>'+
      '<span class="bar-score" style="color:'+b.color+'">'+b.score+'/'+b.max+'</span>'+
      '</div><div class="bar-detail">'+b.detail+'</div></div>';
  });
  document.getElementById('v7Bars').innerHTML=h;

  var vb=document.getElementById('v7VerdictBar');
  vb.style.display='block'; vb.className='verdict-bar '+v.vc;
  vb.textContent=v.verdict+' · V7='+v.total+'/100';
}

function updateStrategy(p,ch) {
  var up=ch>=0, dir=up?'做多':'做空', dc=up?'dir-long':'dir-short', bc=up?'ll-buy':'ll-sell';
  var tp1=p+(up?50:-50), tp2=p+(up?130:-130), tp3=p+(up?250:-250);
  document.getElementById('strategyContent').innerHTML=
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">'+
    '<b>📊 策略参考</b>'+
    '<span class="dir-badge '+dc+'" style="font-size:13px;padding:3px 10px">'+dir+'</span></div>'+
    '<div class="layer-box '+bc+'"><b>H1方向:</b> '+(up?'🟢 偏多':'🔴 偏空')+' · 止损'+(up?'下方':'上方')+'20点</div>'+
    '<div style="text-align:center;font-size:10px;color:#30363d;margin:1px 0">⬇</div>'+
    '<div class="layer-box ll-m5"><b style="color:#39d2c0">🔍 M5进场区</b><br>'+
    '<span style="font-size:9px;color:#6e7681">'+(p-3).toFixed(1)+' ~ '+(p+2).toFixed(1)+' · 止损5点</span></div>'+
    '<div style="text-align:center;font-size:10px;color:#30363d;margin:1px 0">⬇</div>'+
    '<div class="layer-box '+bc+'"><b>🎯 目标:</b> TP1 '+tp1.toFixed(0)+' · TP2 '+tp2.toFixed(0)+' · TP3 '+tp3.toFixed(0)+'</div>';
}

function updateIndicators(p) {
  var n=ST.closes.length;
  if(n<14){ document.getElementById('indicatorRow').innerHTML='<span style="color:#6e7681;font-size:11px">数据积累…('+n+'/14)</span>'; return; }
  var rsiV=TI.rsi(ST.closes,14), lRsi=rsiV[n-1]||50;
  var md=TI.macd(ST.closes), lMacd=md.macd[n-1], lHist=md.histogram[n-1];
  var s20=TI.sma(ST.closes,20), lSMA=s20[n-1];
  var atrV=TI.atr(ST.highs,ST.lows,ST.closes,14), lATR=atrV[n-1];

  var rC=lRsi>70?'#f85149':lRsi<30?'#26d982':'#e6b450';
  var mC=(lMacd||0)>0?'#26d982':'#f85149';

  document.getElementById('indicatorRow').innerHTML=
    '<div class="ind-item"><div class="ind-val" style="color:'+rC+'">'+lRsi.toFixed(1)+'</div><div class="ind-label">RSI(14)</div></div>'+
    '<div class="ind-item"><div class="ind-val" style="color:'+mC+'">'+(lMacd||0).toFixed(2)+'</div><div class="ind-label">MACD</div></div>'+
    '<div class="ind-item"><div class="ind-val cyan">'+(lSMA||0).toFixed(1)+'</div><div class="ind-label">MA20</div></div>'+
    '<div class="ind-item"><div class="ind-val purple">'+(lATR||0).toFixed(1)+'</div><div class="ind-label">ATR(14)</div></div>';

  var s='';
  if(lRsi>70) s='⚠️ RSI超买区，注意回调';
  else if(lRsi<30) s='🟢 RSI超卖区，反弹概率大';
  else if(lRsi>50) s='RSI偏强，多头占优';
  else s='RSI偏弱，空头占优';
  if(lHist!==null) s+=lHist>0?' · MACD正值':' · MACD负值';
  document.getElementById('indSummary').textContent=s;
}

function updateSR(p) {
  var r1=Math.round(p/10)*10+15, s1=Math.round(p/10)*10-15, r2=r1+35, s2=s1-35;
  document.getElementById('srGrid').innerHTML=
    '<div class="sr-item" style="background:#f8514912;border-color:#f8514930"><div class="sr-label" style="color:#f85149">R2</div><div class="sr-val" style="color:#f85149">'+r2+'</div></div>'+
    '<div class="sr-item" style="background:#e6b45010;border-color:#e6b45045"><div class="sr-label" style="color:#e6b450">R1</div><div class="sr-val" style="color:#e6b450">'+r1+'</div></div>'+
    '<div class="sr-item" style="background:#e6b45008;border:2px solid #e6b45055"><div class="sr-label" style="color:#e6b450">现价</div><div class="sr-val" style="color:#e6b450;font-size:9px">'+p.toFixed(1)+'</div></div>'+
    '<div class="sr-item" style="background:#26d98206;border-color:#26d98225"><div class="sr-label" style="color:#26d982">S1</div><div class="sr-val" style="color:#26d982">'+s1+'</div></div>'+
    '<div class="sr-item" style="background:#26d98210;border-color:#26d98235"><div class="sr-label" style="color:#26d982">S2</div><div class="sr-val" style="color:#26d982">'+s2+'</div></div>';
}

function updatePattern(p) {
  var v=ST.v7; if(!v) return;
  var pn=v.pattern.name, pc=Math.round(v.pattern.confidence);
  var color=pc>=65?'#26d982':pc>=50?'#e6b450':'#e0833a';
  document.getElementById('patternArea').innerHTML=
    '<span class="pattern-badge" style="background:'+color+'15;border:1px solid '+color+'55;color:'+color+'">'+pn+'</span>'+
    ' <span style="font-size:9px;color:#6e7681">置信度 '+pc+'%</span>'+
    (v.isUp?' <span style="font-size:9px;color:#26d982">方向:偏多</span>':' <span style="font-size:9px;color:#f85149">方向:偏空</span>');
}

function calcPos() {
  var c=parseFloat(document.getElementById('capital').value)||75;
  var r=parseFloat(document.getElementById('riskPct').value)||10;
  var s=parseFloat(document.getElementById('stopLoss').value)||5;
  var ra=c*r/100, lots=ra/s;
  document.getElementById('posResult').textContent=lots.toFixed(2)+' 手';
  document.getElementById('posDetail').textContent='$'+ra.toFixed(2)+'÷'+s+'点='+lots.toFixed(2)+'手 | 每点$'+lots.toFixed(2);
}

function manualRefresh(){ showT('🔄 刷新中…'); fetchPrice(); }

function copyLink() {
  var url=window.location.href.split('?')[0];
  if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(url).then(function(){showT('✅ 已复制');}); }
  else{
    var ta=document.createElement('textarea'); ta.value=url;
    ta.style.cssText='position:fixed;opacity:0'; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
    showT('✅ 已复制');
  }
}
function showT(msg){ var t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(function(){t.classList.remove('show');},1500); }

// ==================== 初始化 ====================
function init() {
  try{
    var s=localStorage.getItem('paw3pro');
    if(s){
      var d=JSON.parse(s);
      ST.price=d.price||ST.price; ST.prices=d.prices||[]; ST.highs=d.highs||[];
      ST.lows=d.lows||[]; ST.closes=d.closes||[];
      ST.lastFetch=d.lastFetch?new Date(d.lastFetch):null; ST.fetchCount=d.fetchCount||0;
    }
  }catch(e){}

  updateAll();
  document.getElementById('statusText').textContent=ST.lastFetch?'📡 缓存·更新中':'📡 默认·更新中';
  document.getElementById('indicatorRow').innerHTML='<div class="ind-item"><div class="ind-val" style="color:#6e7681">--</div><div class="ind-label">RSI</div></div><div class="ind-item"><div class="ind-val" style="color:#6e7681">--</div><div class="ind-label">MACD</div></div><div class="ind-item"><div class="ind-val" style="color:#6e7681">--</div><div class="ind-label">MA20</div></div><div class="ind-item"><div class="ind-val" style="color:#6e7681">--</div><div class="ind-label">ATR</div></div>';

  setTimeout(function(){ fetchPrice(); },200);
  calcPos();
}

document.addEventListener('DOMContentLoaded', init);
</script>
